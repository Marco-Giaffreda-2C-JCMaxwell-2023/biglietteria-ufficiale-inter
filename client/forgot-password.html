<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recupera Credenziali - Inter</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* FORZA SFONDO NERO FISSO */
        body.auth-page {
            background: #0c0d10 !important;
            min-height: 100vh;
        }
        
        .auth-card {
            background: #13141a !important;
        }
        
        /* Tutti i testi bianchi tranne i messaggi che avranno colore specifico */
        .auth-card, 
        .auth-card * {
            color: #f0ede8 !important;
        }
        
        /* Input con sfondo scuro */
        .auth-card input {
            background: #1a1b24 !important;
            border-color: rgba(255,255,255,0.08) !important;
            color: #f0ede8 !important;
        }
        
        .auth-card input::placeholder {
            color: #5e5b57 !important;
        }
        
        /* Link "Torna al login" */
        .auth-footer a {
            color: #c8a97e !important;
        }
        
        .auth-footer a:hover {
            opacity: 0.75;
        }
        
        /* I messaggi di successo avranno testo nero */
        .success-message {
            background: #e8f5e9 !important;
            padding: 10px !important;
            border-radius: 8px !important;
            color: #212529 !important;
        }
        
        .success-message a {
            color: #212529 !important;
            font-weight: bold !important;
            text-decoration: underline !important;
        }
        
        .success-message a:hover {
            color: #c8a97e !important;
        }
        
        .success-message strong {
            color: #212529 !important;
        }
        
        /* Messaggi di errore */
        .error-message {
            background: #ffebee !important;
            padding: 10px !important;
            border-radius: 8px !important;
            color: #c62828 !important;
        }
    </style>
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <img src="/logos/inter.png" alt="Inter Milan">
                <h2>Recupera credenziali</h2>
                <p>Scegli cosa recuperare</p>
            </div>
            
            <!-- Tabs per scegliere cosa recuperare -->
            <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                <button type="button" id="showPasswordTab" class="btn-auth" style="padding: 10px; font-size: 14px;">Password dimenticata</button>
                <button type="button" id="showUsernameTab" class="btn-auth" style="padding: 10px; font-size: 14px; background: #6c757d;">Username dimenticato</button>
            </div>
            
            <!-- Form per recupero password -->
            <div id="passwordForm">
                <form id="forgotPasswordForm" class="auth-form">
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" required>
                    </div>
                    <button type="submit" class="btn-auth">Invia link di reset</button>
                </form>
            </div>
            
            <!-- Form per recupero username -->
            <div id="usernameForm" style="display: none;">
                <form id="forgotUsernameForm" class="auth-form">
                    <div class="form-group">
                        <label for="emailUsername">Email</label>
                        <input type="email" id="emailUsername" name="emailUsername" required>
                    </div>
                    <button type="submit" class="btn-auth">Invia username</button>
                </form>
            </div>
            
            <div id="message" style="margin-top: 15px; text-align: center;"></div>
            <div class="auth-footer">
                <p><a href="login.html">Torna al login</a></p>
            </div>
        </div>
    </div>
    <script>
        // Tabs
        document.getElementById('showPasswordTab').addEventListener('click', () => {
            document.getElementById('passwordForm').style.display = 'block';
            document.getElementById('usernameForm').style.display = 'none';
            document.getElementById('showPasswordTab').style.background = 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)';
            document.getElementById('showUsernameTab').style.background = '#6c757d';
        });
        
        document.getElementById('showUsernameTab').addEventListener('click', () => {
            document.getElementById('passwordForm').style.display = 'none';
            document.getElementById('usernameForm').style.display = 'block';
            document.getElementById('showUsernameTab').style.background = 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)';
            document.getElementById('showPasswordTab').style.background = '#6c757d';
        });
        
        // Funzione per mostrare messaggio successo (con testo NERO)
        function showSuccessMessage(message) {
            const messageDiv = document.getElementById('message');
            messageDiv.innerHTML = `<div class="success-message">${message}</div>`;
        }
        
        // Funzione per mostrare messaggio errore
        function showErrorMessage(message) {
            const messageDiv = document.getElementById('message');
            messageDiv.innerHTML = `<div class="error-message">${message}</div>`;
        }
        
        // Recupero password
        document.getElementById('forgotPasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            
            try {
                const response = await fetch('/api/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await response.json();
                
                if (data.success) {
                    showSuccessMessage(data.message);
                } else {
                    showErrorMessage(data.message);
                }
            } catch (error) {
                showErrorMessage('Errore di connessione');
            }
        });
        
        // Recupero username
        document.getElementById('forgotUsernameForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('emailUsername').value;
            
            try {
                const response = await fetch('/api/forgot-username', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await response.json();
                
                if (data.success) {
                    // Il messaggio "Il tuo username è: pippo" sarà NERO
                    showSuccessMessage(data.message);
                } else {
                    showErrorMessage(data.message);
                }
            } catch (error) {
                console.error('Errore:', error);
                showErrorMessage('Errore di connessione');
            }
        });
    </script>
</body>
</html>
