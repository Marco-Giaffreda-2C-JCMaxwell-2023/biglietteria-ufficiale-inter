<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuova Password - Inter</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* FORZA SFONDO NERO FISSO */
        body.auth-page {
            background: #0c0d10 !important;
            min-height: 100vh;
        }
        
        .auth-card {
            background: #13141a !important;
        }
        
        /* Tutti i testi bianchi */
        .auth-card, 
        .auth-card * {
            color: #f0ede8 !important;
        }
        
        /* Input con sfondo scuro */
        .auth-card input {
            background: #1a1b24 !important;
            border-color: rgba(255,255,255,0.08) !important;
            color: #f0ede8 !important;
        }
        
        .auth-card input::placeholder {
            color: #5e5b57 !important;
        }
        
        /* Pulsante */
        .btn-auth {
            background: #c8a97e !important;
            color: #0c0d10 !important;
        }
        
        .btn-auth:hover {
            opacity: 0.88;
        }
        
        /* Link "Torna al login" */
        .auth-footer a {
            color: #c8a97e !important;
        }
        
        .auth-footer a:hover {
            opacity: 0.75;
        }
        
        /* Messaggi di successo */
        .success-message {
            background: #e8f5e9 !important;
            padding: 10px !important;
            border-radius: 8px !important;
            color: #1b5e20 !important;
        }
        
        /* Messaggi di errore */
        .error-message {
            background: #ffebee !important;
            padding: 10px !important;
            border-radius: 8px !important;
            color: #c62828 !important;
        }
    </style>
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <img src="/logos/inter.png" alt="Inter Milan">
                <h2>Nuova password</h2>
                <p>Inserisci la nuova password</p>
            </div>
            <form id="resetForm" class="auth-form">
                <input type="hidden" id="token" name="token">
                <div class="form-group">
                    <label for="password">Nuova password</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <div class="form-group">
                    <label for="confirmPassword">Conferma password</label>
                    <input type="password" id="confirmPassword" required>
                </div>
                <button type="submit" class="btn-auth">Cambia password</button>
            </form>
            <div id="message" style="margin-top: 15px; text-align: center;"></div>
            <div class="auth-footer">
                <p><a href="login.html">Torna al login</a></p>
            </div>
        </div>
    </div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        document.getElementById('token').value = token || '';
        
        function showSuccessMessage(message) {
            const messageDiv = document.getElementById('message');
            messageDiv.innerHTML = `<div class="success-message">${message}</div>`;
        }
        
        function showErrorMessage(message) {
            const messageDiv = document.getElementById('message');
            messageDiv.innerHTML = `<div class="error-message">${message}</div>`;
        }
        
        if (!token) {
            showErrorMessage('Token non valido');
            document.getElementById('resetForm').style.display = 'none';
        }
        
        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            if (password !== confirmPassword) {
                showErrorMessage('Le password non coincidono');
                return;
            }
            
            if (password.length < 6) {
                showErrorMessage('La password deve essere almeno 6 caratteri');
                return;
            }
            
            try {
                const response = await fetch('/api/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, newPassword: password })
                });
                const data = await response.json();
                
                if (data.success) {
                    showSuccessMessage(data.message);
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                } else {
                    showErrorMessage(data.message);
                }
            } catch (error) {
                showErrorMessage('Errore di connessione');
            }
        });
    </script>
</body>
</html>
