<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Area Admin - Inter Biglietteria</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .admin-dashboard {
            background: white;
            border-radius: 24px;
            padding: 24px;
            margin-top: 20px;
        }
        .filters {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: flex-end;
        }
        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .filter-group label {
            font-weight: 600;
            font-size: 12px;
            color: #666;
        }
        .filter-group select, .filter-group input {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            min-width: 180px;
        }
        .btn-filter {
            background: #667eea;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 8px;
            cursor: pointer;
        }
        .tickets-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            font-size: 13px;
        }
        .tickets-table th, .tickets-table td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: left;
        }
        .tickets-table th {
            background: #f0f0f0;
            font-weight: 600;
        }
        .tickets-table tr:hover {
            background: #f9f9f9;
        }
        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .stat-card {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 15px 25px;
            border-radius: 16px;
            text-align: center;
        }
        .stat-card h3 {
            font-size: 28px;
            margin-bottom: 5px;
        }
        .stat-card p {
            font-size: 12px;
            opacity: 0.9;
        }
        .online-users-section {
            margin-top: 30px;
        }
        .online-users-section h2 {
            margin-bottom: 15px;
            font-size: 20px;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <img src="/logos/inter.png" alt="Inter Milan">
                <span>Area Amministrazione</span>
            </div>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="#" id="refreshBtn">Aggiorna</a>
            </div>
            <div class="user-info">
                <span id="adminName"></span>
                <button id="logoutBtn" class="btn-logout">Esci</button>
            </div>
        </div>
    </nav>
    <div class="main-container">
        <h1>Pannello di Controllo</h1>
        <!-- Sezione Dashboard Statistiche -->
<div class="admin-dashboard" style="margin-bottom: 30px;">
    <h2>Dashboard vendite</h2>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
        <div>
            <canvas id="ticketsPerMatchChart" style="max-height: 300px;"></canvas>
        </div>
        <div>
            <canvas id="salesTrendChart" style="max-height: 300px;"></canvas>
        </div>
    </div>
    <div style="margin-top: 20px;">
        <canvas id="popularSectorsChart" style="max-height: 300px;"></canvas>
    </div>
</div>
        <!-- Sezione Gestione Prezzi -->
<div class="admin-dashboard" style="margin-bottom: 30px;">
    <h2>Gestione prezzi settori</h2>
    <div class="price-manager">
        <div class="filter-group">
            <label>Seleziona partita:</label>
            <select id="priceEventSelect" class="price-select">
                <option value="">Caricamento partite...</option>
            </select>
        </div>
        <div class="filter-group">
            <label>Seleziona settore:</label>
            <select id="sectorSelect" class="price-select">
                <option value="">Seleziona il settore</option>
            </select>
        </div>
        <div class="filter-group">
            <label>Nuovo prezzo:</label>
            <input type="number" id="newPrice" step="5" min="0" placeholder="Es. 50">
        </div>
        <button id="updatePriceBtn" class="btn-filter" style="background: #28a745;">Aggiorna prezzo</button>
        <div id="priceUpdateMessage" style="margin-top: 10px; font-size: 14px;"></div>
    </div>
</div>

<style>
    .price-manager {
        display: flex;
        gap: 15px;
        flex-wrap: wrap;
        align-items: flex-end;
        margin-top: 15px;
    }
    .price-select {
        padding: 10px 12px;
        border: 1px solid #ddd;
        border-radius: 8px;
        min-width: 200px;
    }
</style>
        <div id="adminContent">
            <div class="admin-dashboard">
                <p>Caricamento biglietti venduti...</p>
            </div>
        </div>

        <!-- SEZIONE UTENTI COLLEGATI IN TEMPO REALE -->
        <div class="online-users-section">
            <h2>Utenti collegati in tempo reale</h2>
            <div id="onlineUsersContainer" style="background: #f8f9fa; border-radius: 16px; padding: 20px; min-height: 100px;">
                <p>Caricamento utenti online...</p>
            </div>
        </div>
    </div>
    <script src="admin.js"></script>
</body>
</html>
